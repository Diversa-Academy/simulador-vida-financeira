<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Vida Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080d1a;--bg2:#0e1529;--card:#131c32;--card2:#182440;
  --border:#1e2e50;--text:#e0e8f8;--muted:#7a8db0;
  --accent:#2d8cf0;--accent2:#5ba3f5;
  --green:#00d68f;--green2:#00b377;
  --red:#ff4d6a;--red2:#e63e5a;
  --yellow:#ffb347;--font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;--radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 0%,#0f1e3d 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,#0d1a35 0%,transparent 50%)}
input,select,button{font-family:var(--font);outline:none;border:none}
.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#welcome{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#060a14 0%,#0c1628 50%,#0a1020 100%);gap:24px;transition:opacity .5s,visibility .5s}
#welcome.hidden{opacity:0;visibility:hidden;pointer-events:none}
#welcome img{max-width:280px;width:80%;filter:drop-shadow(0 4px 24px rgba(45,140,240,.25))}
#welcome h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:700;letter-spacing:-.5px;color:var(--text)}
#welcome p{color:var(--muted);font-size:.95rem;max-width:400px;text-align:center;line-height:1.5}
#welcome .input-group{display:flex;gap:10px;margin-top:8px}
#welcome input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:var(--radius);font-size:1rem;width:260px;transition:border-color .2s}
#welcome input:focus{border-color:var(--accent)}
#welcome input::placeholder{color:var(--muted)}

#gameover{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,2,2,.95);gap:20px;text-align:center}
#gameover.show{display:flex}
#gameover h1{font-size:3rem;font-weight:700;color:var(--red);letter-spacing:2px}
#gameover p{color:var(--muted);max-width:400px;line-height:1.6}

.btn{padding:10px 20px;border-radius:var(--radius);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-green{background:var(--green2);color:#fff}.btn-green:hover{background:var(--green);transform:translateY(-1px)}
.btn-red{background:var(--red2);color:#fff}.btn-red:hover{background:var(--red);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-advance{padding:12px 28px;font-size:.95rem;background:linear-gradient(135deg,var(--accent),#1a6fd4);color:#fff;border-radius:var(--radius);font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(45,140,240,.3)}
.btn-advance:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(45,140,240,.45)}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-area img{height:36px}
.header-stats{display:flex;gap:16px;flex-wrap:wrap}
.h-stat{text-align:center}
.h-stat .label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.h-stat .value{font-family:var(--mono);font-size:.9rem;font-weight:600}
.header-actions{display:flex;gap:8px;align-items:center}

.tabs{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px;max-width:1280px;margin:0 auto}
.tab{padding:12px 18px;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{max-width:1280px;margin:0 auto;padding:20px}
.tab-panel{display:none}.tab-panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s}
.card:hover{border-color:#2a3f6a}
.card-title{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title i{color:var(--accent);font-size:.75rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-card .sc-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .sc-value{font-family:var(--mono);font-size:1.3rem;font-weight:700}
.sc-green{color:var(--green)}.sc-red{color:var(--red)}.sc-accent{color:var(--accent)}.sc-yellow{color:var(--yellow)}

.table-wrap{overflow-x:auto;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(30,46,80,.4);vertical-align:middle}
tr:hover td{background:rgba(45,140,240,.03)}

.inp{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:.85rem;width:120px;font-family:var(--mono);transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 10px;font-size:.8rem;width:100px}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-green{background:rgba(0,214,143,.12);color:var(--green)}
.badge-red{background:rgba(255,77,106,.12);color:var(--red)}
.badge-yellow{background:rgba(255,179,71,.12);color:var(--yellow)}
.badge-blue{background:rgba(45,140,240,.12);color:var(--accent)}

.sub-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:7px 14px;font-size:.78rem;color:var(--muted);cursor:pointer;border-radius:6px;background:var(--bg2);border:1px solid transparent;transition:all .2s}
.sub-tab:hover{color:var(--text)}.sub-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(45,140,240,.08)}

.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(4,6,14,.85);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;animation:fadeUp .25s ease}
.modal h2{font-size:1.2rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.modal h2 i{color:var(--accent)}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,46,80,.3);font-size:.88rem}
.summary-row:last-child{border-bottom:none}
.summary-row .sr-label{color:var(--muted)}
.summary-total{display:flex;justify-content:space-between;padding:12px 0;margin-top:8px;border-top:2px solid var(--border);font-weight:700;font-size:1rem}

#toasts{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:.85rem;animation:slideIn .3s ease;max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast-green{background:#0a2e20;border:1px solid var(--green2);color:var(--green)}
.toast-red{background:#2e0a14;border:1px solid var(--red2);color:var(--red)}
.toast-yellow{background:#2e2010;border:1px solid #b8860b;color:var(--yellow)}
.toast-blue{background:#0a1a2e;border:1px solid var(--accent);color:var(--accent2)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.sparkline{display:flex;align-items:flex-end;gap:1px;height:28px}
.sparkline .bar{width:4px;border-radius:1px;transition:height .3s;min-height:2px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){
  .two-col,.three-col{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
  .header-stats{display:none}
  .tabs{padding:0 8px}
  .main{padding:12px}
}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr}}
.section-gap{margin-top:20px}
.text-center{text-align:center}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem}
.empty-state i{font-size:2rem;margin-bottom:12px;display:block;opacity:.4}
.req-met{color:var(--green)}.req-unmet{color:var(--red)}
.event-item{padding:10px 14px;background:var(--bg2);border-radius:8px;margin-bottom:6px;font-size:.85rem;border-left:3px solid var(--yellow)}

.chart-container{position:relative;width:100%;height:220px}
.chart-container canvas{width:100%!important;height:100%!important}

/* Ícones de ativos */
.asset-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;font-size:.7rem;font-weight:700;
  margin-right:8px;flex-shrink:0;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.asset-icon i{font-size:.72rem}
.asset-name-cell{display:flex;align-items:center}
.asset-name-cell .asset-text{display:flex;flex-direction:column}
.asset-name-cell .asset-text .an-ticker{font-weight:600;font-size:.82rem;line-height:1.2}
.asset-name-cell .asset-text .an-name{font-size:.72rem;color:var(--muted);line-height:1.2}
</style>
</head>

<div id="welcome">

  <h1>Simulador de Vida Financeira</h1>

<div class="modal-overlay" id="summaryModal">

</div>

<div id="game" style="display:none">

        <div class="h-stat"><div class="label">Idade</div><div class="value mono" id="hAge"></div></div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" id="resetBtn" onclick="confirmReset()"><i class="fa-solid fa-rotate-right"></i> Resetar</button>

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
const fmt = n => {
  if(n==null) return 'R$ 0';
  const abs = Math.abs(n);
  const s = abs >= 1e6 ? (abs/1e6).toFixed(2)+'M' : abs >= 1e3 ? (abs/1e3).toFixed(1)+'K' : abs.toFixed(2);
  return (n<0?'-':'')+'R$ '+s;
};
const fmtFull = n => n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtN = n => n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2});
const clamp = (v,min,max) => Math.max(min,Math.min(max,v));
const rand = (a,b) => a + Math.random()*(b-a);
const randInt = (a,b) => Math.floor(rand(a,b+1));
const pct = (v) => (v>=0?'+':'')+fmtN(v)+'%';
const monthLabel = m => { const y=2024+Math.floor((m-1)/12); const mo=((m-1)%12)+1; return mo+'/'+y; };

function canTakeJob(j) { return G.month >= j.req.month; }

function calcNetWorth() {
  let nw = G.balance;
  nw += G.inv.savings + G.inv.treasurySelic;
  G.inv.fixedIncome.forEach(i => nw += i.currentValue);
  G.inv.treasuryIpca.forEach(i => nw += i.currentValue);
  for(const t in G.inv.fiis) if(G.inv.fiis[t].shares>0) nw += G.inv.fiis[t].shares * (G.prices[t]||0);
  for(const t in G.inv.stocks) if(G.inv.stocks[t].shares>0) nw += G.inv.stocks[t].shares * (G.prices[t]||0);
  for(const t in G.inv.crypto) if(G.inv.crypto[t].shares>0) nw += G.inv.crypto[t].shares * (G.prices[t]||0);
  G.cars.forEach(c => nw += c.currentValue);
  G.properties.forEach(p => nw += p.currentValue);
  G.loans.forEach(l => nw -= l.remaining);
  return nw;
}

function monthlyExpenses() {
  let tot = G.expenses.food + G.expenses.transport + G.expenses.insurance + G.expenses.utilities;
  if(!G.livingInProp) tot += G.expenses.rent;
  G.cars.forEach(c => tot += c.cost);
  return tot;
}

function monthlyIncome() {
  let inc = 0;
  if(G.job && G.job.salary>0) inc += G.job.salary;
  G.companies.forEach(c => { if(c.months > 6) inc += Math.max(0, c.lastProfit||0); });
  G.properties.forEach(p => { if(p.isRented) inc += p.rent; });
  return inc;
}

function propertyExpenseMultiplier() {
  if(G.livingInProp === null) return 1;
  const p = G.properties[G.livingInProp];
  if(!p) return 1;
  if(p.purchasePrice <= 150000) return 1.2;
  if(p.purchasePrice <= 400000) return 1.5;
  if(p.purchasePrice <= 900000) return 1.8;
  if(p.purchasePrice <= 2000000) return 2.2;
  return 3.0;
}

function sparklineHTML(hist, color) {
  if(!hist || hist.length<2) return '';
  const mn = Math.min(...hist), mx = Math.max(...hist);
  const range = mx-mn || 1;
  return '<div class="sparkline">' + hist.map(v => {
    const h = 4 + ((v-mn)/range)*24;
    return `<div class="bar" style="height:${h}px;background:${color}"></div>`;
  }).join('') + '</div>';
}

  document.getElementById('hAge').textContent = G.age + ' anos';

  document.getElementById('tabBar').innerHTML = TABS.map(t =>
    `<div class="tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')"><i class="fa-solid ${t.icon}" style="margin-right:5px"></i>${t.label}</div>`

}

// ----- CARREIRA -----
function renderCarreira() {
  const jobHTML = G.job.id !== 'desempregado'
    ? `<div class="card"><div class="card-title"><i class="fa-solid fa-id-badge"></i> Emprego Atual</div><div style="font-size:1.2rem;font-weight:600;margin-bottom:4px">${G.job.title}</div><div class="mono" style="color:var(--green);font-size:1.1rem">${fmtFull(G.job.salary)}/mês</div></div>`
    : `<div class="card" style="border-color:var(--red2)"><div class="card-title"><i class="fa-solid fa-user-slash"></i> Desempregado</div><p style="color:var(--muted);font-size:.9rem">Procure um emprego abaixo ou sobreviva de suas reservas.</p></div>`;

  let searchHTML = '';
  if(G.jobSearch) {
    const sj = JOBS.find(x=>x.id===G.jobSearch.jobId);
    const level = JOBS.findIndex(x=>x.id===G.jobSearch.jobId);
    const chance = Math.min(95, Math.round((Math.max(2, 35 - level * 4.5) + G.jobSearch.monthsSearching * 5) * 10) / 10);
    searchHTML = `<div class="card" style="border-color:var(--yellow)">
      <div class="card-title"><i class="fa-solid fa-spinner fa-spin"></i> Buscando Emprego</div>
      <div style="font-size:.9rem;margin-bottom:4px">Candidatando-se para: <strong>${sj?sj.title:'---'}</strong></div>
      <div style="font-size:.82rem;color:var(--muted)">Há ${G.jobSearch.monthsSearching} mês${G.jobSearch.monthsSearching!==1?'es':''} — Chance estimada: <span style="color:var(--yellow)">${chance}%</span> neste mês</div>
      <div class="mt-2"><button class="btn btn-sm btn-ghost" onclick="cancelJobSearch()"><i class="fa-solid fa-xmark"></i> Cancelar</button></div>
    </div>`;
  }

  const jobsHTML = JOBS.filter(j=>j.id!=='desempregado').map(j => {
    const met = canTakeJob(j);
    const isCurrent = G.job.id === j.id;
    const isSearching = G.jobSearch && G.jobSearch.jobId === j.id;
    const btnDisabled = !met || isCurrent || isSearching;
    const btnClass = btnDisabled ? 'btn-ghost' : 'btn-green';
    const btnText = isCurrent ? '<span class="badge badge-blue">Atual</span>' : isSearching ? '<span class="badge badge-yellow">Buscando</span>' : 'Candidate-se';
    const btnAction = isCurrent || isSearching ? '' : `onclick="applyForJob('${j.id}')"`;
    return `<tr style="${isCurrent?'background:rgba(45,140,240,.08)':''}">
      <td style="font-weight:500">${j.title}</td>
      <td class="mono" style="color:var(--green)">${fmtFull(j.salary)}</td>
      <td><span class="${met?'req-met':'req-unmet'}" style="font-size:.78rem">${j.req.month>0?j.req.month+' meses':'-'}</span></td>
      <td>${isCurrent || isSearching ? btnText : `<button class="btn btn-sm ${btnClass}" ${btnAction}>Candidate-se</button>`}</td>
    </tr>`;
  }).join('');

  let companyHTML = '';
  if(G.companies.length > 0) {
    companyHTML = G.companies.map((c, idx) => {
      const phase = c.months <= 6 ? 'Maturação' : 'Ativa';
      const phaseColor = c.months <= 6 ? 'var(--yellow)' : 'var(--green)';
      const cname = c.name || 'Empresa ' + (idx+1);
      return `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-building"></i> ${cname}</div>
        <div class="flex-between"><span>Fase:</span><span style="color:${phaseColor};font-weight:600">${phase} (${c.months} meses)</span></div>
        ${c.months > 6 ? `<div class="flex-between mt-2"><span>Último lucro:</span><span class="mono ${(c.lastProfit||0)>=0?'sc-green':'sc-red'}">${fmtFull(c.lastProfit||0)}</span></div>` : `<div class="mt-2" style="font-size:.82rem;color:var(--yellow)">Custo de maturação: ${fmtFull(5000)}/mês por mais ${6-c.months} meses</div>`}
        <div class="mt-3 flex-between">
          ${c.months > 6 ? `<button class="btn btn-sm btn-ghost" onclick="sellCompany(${idx})"><i class="fa-solid fa-hand-holding-usd"></i> Vender</button>` : ''}
          <button class="btn btn-red btn-sm" onclick="closeCompany(${idx})"><i class="fa-solid fa-xmark"></i> Fechar</button>
        </div></div>`;
    }).join('');
  }
  companyHTML += `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-rocket"></i> Empreendedorismo</div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:12px">Abra sua própria empresa. Investimento inicial: <strong style="color:var(--text)">${fmtFull(100000)}</strong>. Nos primeiros 6 meses há custos de maturação. Após isso, a empresa gera lucros variáveis.</p>
    <button class="btn btn-primary btn-sm" ${G.balance>=100000?`onclick="openCompany()"`:'disabled'}><i class="fa-solid fa-door-open"></i> Abrir Empresa</button></div>`;

  document.getElementById('panel-carreira').innerHTML = `${jobHTML}
    ${searchHTML}
    <div class="card section-gap"><div class="card-title"><i class="fa-solid fa-list-check"></i> Vagas Disponíveis</div><div class="table-wrap"><table><thead><tr><th>Cargo</th><th>Salário</th><th>Requisitos</th><th>Ação</th></tr></thead><tbody>${jobsHTML}</tbody></table></div></div>
    ${companyHTML}`;
}

// ----- INVESTIMENTOS -----
function renderInvestimentos() {
  const subHTML = INV_SUBTABS.map(s => `<div class="sub-tab ${activeInvTab===s.id?'active':''}" onclick="activeInvTab='${s.id}';render()">${s.label}</div>`).join('');
  let content = '';
  switch(activeInvTab) {
    case 'reserva': content = renderReserva(); break;
    case 'rendafixa': content = renderRendaFixa(); break;
    case 'tesouro': content = renderTesouro(); break;
    case 'fiis': content = renderVar(FIIS, 'fiis', true); break;
    case 'acoes': content = renderVar(STOCKS, 'stocks', false); break;
    case 'cripto': content = renderVar(CRYPTOS, 'crypto', false); break;
  }
  document.getElementById('panel-investimentos').innerHTML = `<div class="sub-tabs">${subHTML}</div>${content}`;
}

function renderReserva() {
  const rate = (0.06/12*100);
  const monthlyReturn = G.inv.savings * rate / 100;
  return `<div class="card"><div class="card-title"><i class="fa-solid fa-piggy-bank"></i> Reserva de Emergência (Poupança)</div>
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="sc-label">Saldo</div><div class="sc-value sc-green mono">${fmtFull(G.inv.savings)}</div></div>
      <div class="stat-card"><div class="sc-label">Rendimento Mensal</div><div class="sc-value sc-accent mono">${fmtN(rate)}% (${fmtFull(monthlyReturn)})</div></div>
    </div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">Liquidez imediata. Rendimento de 6% a.a. Ideal para sua reserva de emergência.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="inp" type="number" id="savDep" placeholder="Valor..." min="0" step="100"><button class="btn btn-green btn-sm" onclick="depositSavings()"><i class="fa-solid fa-plus"></i> Depositar</button>
      <input class="inp" type="number" id="savWit" placeholder="Valor..." min="0" step="100"><button class="btn btn-red btn-sm" onclick="withdrawSavings()"><i class="fa-solid fa-minus"></i> Sacar</button>
    </div></div>`;
}

function renderRendaFixa() {
  const availHTML = FIXED_INCOME.map(fi => {
    let rateStr = fi.type==='pos' ? `${fmtN(G.selic + fi.spread)}% a.a. (CDI ${fmtN(G.selic)}% ${fi.spread>0?'+':' '}${fmtN(fi.spread)}%)` : `${fmtN(fi.rate)}% a.a. (prefixada)`;
    return `<tr><td style="font-weight:500">${fi.name}</td><td class="mono" style="font-size:.8rem">${rateStr}</td><td>${fi.locked>0?`<span class="badge badge-yellow">${fi.locked} meses</span>`:'<span class="badge badge-green">Líquido</span>'}</td>
      <td><div style="display:flex;gap:4px"><input class="inp inp-sm" type="number" id="fi_${fi.id}" placeholder="R$" min="0" step="1000"><button class="btn btn-green btn-sm" onclick="buyFixedIncome('${fi.id}')">Aplicar</button></div></td></tr>`;
  }).join('');
  const activeHTML = G.inv.fixedIncome.length ? G.inv.fixedIncome.map(inv => `<tr><td style="font-weight:500">${inv.name}</td><td class="mono">${fmtFull(inv.invested)}</td><td class="mono sc-green">${fmtFull(inv.currentValue)}</td><td>${inv.monthsRemaining>0?`<span class="badge badge-yellow">${inv.monthsRemaining} meses</span>`:'<span class="badge badge-green">Vencido</span>'}</td><td class="mono sc-green">${fmtFull(inv.currentValue - inv.invested)}</td></tr>`).join('') : '';
  return `<div class="card"><div class="card-title"><i class="fa-solid fa-file-contract"></i> Renda Fixa Disponível</div><div class="table-wrap"><table><thead><tr><th>Produto</th><th>Taxa</th><th>Liquidez</th><th>Ação</th></tr></thead><tbody>${availHTML}</tbody></table></div></div>
    ${G.inv.fixedIncome.length ? `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-lock"></i> Investimentos Ativos</div><div class="table-wrap"><table><thead><tr><th>Produto</th><th>Aplicado</th><th>Valor Atual</th><th>Vencimento</th><th>Rendimento</th></tr></thead><tbody>${activeHTML}</tbody></table></div></div>` : ''}`;
}

function renderTesouro() {
  const selicRate = G.selic - 0.15;
  const selicMonthly = G.inv.treasurySelic * (selicRate/12/100);
  let html = `<div class="card"><div class="card-title"><i class="fa-solid fa-landmark-flag"></i> Tesouro Selic (Líquido)</div>
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="sc-label">Saldo</div><div class="sc-value sc-green mono">${fmtFull(G.inv.treasurySelic)}</div></div>
      <div class="stat-card"><div class="sc-label">Rendimento Mensal</div><div class="sc-value sc-accent mono">${fmtN(selicRate)}% (${fmtFull(selicMonthly)})</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="inp" type="number" id="tsDep" placeholder="Valor..." min="0" step="1000"><button class="btn btn-green btn-sm" onclick="depositTreasurySelic()"><i class="fa-solid fa-plus"></i> Comprar</button>
      <input class="inp" type="number" id="tsWit" placeholder="Valor..." min="0" step="1000"><button class="btn btn-red btn-sm" onclick="withdrawTreasurySelic()"><i class="fa-solid fa-minus"></i> Resgatar</button>
    </div></div>`;
  const ipcaOpts = TREASURY.filter(t=>t.type==='ipca');
  const ipcaAvailHTML = ipcaOpts.map(t => {
    const totalRate = G.inflation + t.fixedRate;
    return `<tr><td style="font-weight:500">${t.name}</td><td class="mono" style="font-size:.8rem">IPCA+ ${fmtN(t.fixedRate)}% = ${fmtN(totalRate)}% a.a.</td><td><span class="badge badge-yellow">${t.locked} meses</span></td>
      <td><div style="display:flex;gap:4px"><input class="inp inp-sm" type="number" id="tip_${t.id}" placeholder="R$" min="0" step="1000"><button class="btn btn-green btn-sm" onclick="buyTreasuryIpca('${t.id}')">Comprar</button></div></td></tr>`;
  }).join('');
  const ipcaActiveHTML = G.inv.treasuryIpca.length ? G.inv.treasuryIpca.map(inv => `<tr><td style="font-weight:500">${inv.name}</td><td class="mono">${fmtFull(inv.invested)}</td><td class="mono sc-green">${fmtFull(inv.currentValue)}</td><td>${inv.monthsRemaining>0?`<span class="badge badge-yellow">${inv.monthsRemaining} meses</span>`:'<span class="badge badge-green">Vencido</span>'}</td><td class="mono sc-green">${fmtFull(inv.currentValue - inv.invested)}</td></tr>`).join('') : '';
  html += `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-shield-halved"></i> Tesouro IPCA+ (Rendimento Real)</div><div class="table-wrap"><table><thead><tr><th>Título</th><th>Taxa</th><th>Prazo</th><th>Ação</th></tr></thead><tbody>${ipcaAvailHTML}</tbody></table></div></div>`;
  if(G.inv.treasuryIpca.length) html += `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-lock"></i> Tesouro IPCA+ Ativos</div><div class="table-wrap"><table><thead><tr><th>Título</th><th>Aplicado</th><th>Valor Atual</th><th>Vencimento</th><th>Rendimento</th></tr></thead><tbody>${ipcaActiveHTML}</tbody></table></div></div>`;
  return html;
}

function renderVar(assets, key, showDY) {
  // Tabela de disponíveis — com ícones
  const availHTML = assets.map(a => {
    const price = G.prices[a.ticker] || a.basePrice;
    const hist = G.history[a.ticker] || [];
    const prevPrice = hist.length >= 2 ? hist[hist.length-2] : price;
    const changePct = prevPrice > 0 ? ((price - prevPrice)/prevPrice*100) : 0;
    const changeColor = changePct >= 0 ? 'var(--green)' : 'var(--red)';
    const dyStr = showDY ? `<td class="mono" style="color:var(--green)">${(a.dy*100).toFixed(2)}%</td>` : '';
    const icon = assetIcon(key, a.ticker, a.name);
    return `<tr>
      <td><div class="asset-name-cell">${icon}<div class="asset-text"><div class="an-ticker">${a.ticker}</div><div class="an-name">${a.name}</div></div></div></td>
      <td class="mono">${fmtFull(price)}</td>
      <td class="mono" style="color:${changeColor}">${pct(changePct)}</td>
      ${dyStr}
      <td>${sparklineHTML(hist.slice(-8), changeColor)}</td>
      <td><div style="display:flex;gap:4px"><input class="inp inp-sm" type="number" id="v_${key}_${a.ticker}" placeholder="R$" min="0" step="100"><button class="btn btn-green btn-sm" onclick="buyVar('${key}','${a.ticker}')">Comprar</button></div></td>
    </tr>`;
  }).join('');

  // Tabela de posições — com ícones
  const holdings = G.inv[key];
  const activeEntries = Object.entries(holdings).filter(([_,h])=>h.shares>0);
  const activeHTML = activeEntries.length ? activeEntries.map(([ticker,h]) => {
    const asset = assets.find(a=>a.ticker===ticker);
    const price = G.prices[ticker]||0;
    const totalVal = h.shares * price;
    const pnl = totalVal - (h.shares * h.avgPrice);
    const pnlPct = h.avgPrice > 0 ? ((price - h.avgPrice)/h.avgPrice*100) : 0;
    const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const divStr = (showDY && asset) ? `<td class="mono sc-green">${fmtFull(h.shares * price * asset.dy)}/mês</td>` : '';
    const icon = assetIcon(key, ticker, asset ? asset.name : '');
    return `<tr>
      <td><div class="asset-name-cell">${icon}<span style="font-weight:600">${ticker}</span></div></td>
      <td class="mono">${h.shares.toFixed(4)}</td>
      <td class="mono">${fmtFull(h.avgPrice)}</td>
      <td class="mono">${fmtFull(price)}</td>
      <td class="mono" style="color:${pnlColor}">${fmtFull(totalVal)} (${pct(pnlPct)})</td>
      ${divStr}
      <td><div style="display:flex;gap:4px">
        <input class="inp inp-sm" type="number" id="vs_${key}_${ticker}" placeholder="Qtd" min="0" step="0.01">
        <button class="btn btn-red btn-sm" onclick="sellVar('${key}','${ticker}')">Vender</button>
        <button class="btn btn-ghost btn-sm" onclick="sellAllVar('${key}','${ticker}')">Tudo</button>
      </div></td>
    </tr>`;
  }).join('') : '';

  const dyHead = showDY ? '<th>Dividendos</th>' : '';
  return `<div class="card"><div class="card-title"><i class="fa-solid fa-store"></i> Disponíveis para Compra</div>
    <div class="table-wrap"><table><thead><tr><th>Ativo</th><th>Cotação</th><th>Var.</th>${showDY?'<th>DY Mensal</th>':''}<th>Trend</th><th>Ação</th></tr></thead><tbody>${availHTML}</tbody></table></div></div>
    ${activeEntries.length ? `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-briefcase"></i> Suas Posições</div>
    <div class="table-wrap"><table><thead><tr><th>Ativo</th><th>Quantidade</th><th>Preço Médio</th><th>Cotação</th><th>Valor / Resultado</th>${dyHead}<th>Ação</th></tr></thead><tbody>${activeHTML}</tbody></table></div></div>` : ''}`;
}

// ----- BENS -----
function renderBens() {
  // Carros disponíveis — com ícones de marca

    const icon = assetIcon('car', '', c.name);

      <td><button class="btn btn-red btn-sm" onclick="sellCar(${i})">Vender</button></td>
    </tr>`;
  }).join('') : '';

  // Imóveis disponíveis — com ícones
  const propsAvailHTML = PROPERTIES.map(p => {
    const icon = assetIcon('property', '', p.name);
    return `<tr>
      <td><div class="asset-name-cell">${icon}<span style="font-weight:500">${p.name}</span></div></td>
      <td class="mono">${fmtFull(p.price)}</td>
      <td class="mono" style="color:var(--green)">${fmtFull(p.rent)}/mês</td>

    const icon = assetIcon('property', '', p.name);
    return `<tr>
      <td><div class="asset-name-cell">${icon}<span style="font-weight:500">${p.name}</span></div></td>
      <td class="mono">${fmtFull(p.purchasePrice)}</td>
      <td class="mono sc-green">${fmtFull(p.currentValue)}</td>
      <td>${statusBadge}</td>
      <td style="white-space:nowrap">

    ${G.cars.length ? `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-key"></i> Meus Carros</div><div class="table-wrap"><table><thead><tr><th>Modelo</th><th>Preço Compra</th><th>Valor Atual</th><th>Custo Mensal</th><th>Ação</th></tr></thead><tbody>${myCarsHTML}</tbody></table></div></div>` : ''}

}

function renderEmprestimos() {
  const totalDebt = G.loans.reduce((s,l)=>s+l.remaining, 0);
  const monthlyDebt = G.loans.reduce((s,l) => { const i=l.remaining*(l.annualRate/12/100); return s+i+l.originalAmount/l.totalMonths; }, 0);

  const optHTML = LOAN_OPTIONS.map(o => LOAN_TERMS.map(t => {
    const rate = G.selic + 5;
    const mr = rate / 12 / 100;
    const amort = o.amount / t;
    let tp=0,rem=o.amount;
    for(let i=0;i<t;i++){tp+=amort+rem*mr;rem-=amort;}
    const mp = tp/t;
    return `<tr><td class="mono">${o.label}</td><td class="mono">${t} meses</td><td class="mono" style="color:var(--yellow)">${fmtN(rate)}% a.a.</td><td class="mono" style="color:var(--red)">${fmtFull(mp)}/mês</td><td class="mono" style="color:var(--muted)">${fmtFull(tp-o.amount)} juros</td>
      <td><button class="btn btn-sm" style="background:var(--yellow);color:#000;font-weight:600" onclick="takeLoan(${o.amount},${t},${rate})">Pegar</button></td></tr>`;
  }).join('')).join('');

  const activeHTML = G.loans.length ? G.loans.map((l,i) => {
    const interest = l.remaining*(l.annualRate/12/100);
    const amort = l.originalAmount/l.totalMonths;
    const mp = interest+amort;
    return `<tr><td class="mono">${fmtFull(l.originalAmount)}</td><td class="mono" style="color:var(--red)">${fmtFull(l.remaining)}</td><td class="mono">${fmtN(l.annualRate)}%</td><td class="mono">${l.monthsRemaining} meses</td><td class="mono" style="color:var(--red)">${fmtFull(mp)}/mês</td>
      <td><button class="btn btn-green btn-sm" ${G.balance>=l.remaining?`onclick="payLoan(${i})"`:'disabled'}>Quitar</button></td></tr>`;
  }).join('') : '';

  document.getElementById('panel-emprestimos').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="sc-label"><i class="fa-solid fa-money-bill-transfer"></i> Dívida Total</div><div class="sc-value sc-red mono">${fmtFull(totalDebt)}</div></div>
      <div class="stat-card"><div class="sc-label"><i class="fa-solid fa-calendar-xmark"></i> Parcela Mensal</div><div class="sc-value sc-yellow mono">${fmtFull(monthlyDebt)}</div></div>
    </div>
    <div class="card"><div class="card-title"><i class="fa-solid fa-hand-holding-dollar"></i> Opções de Empréstimo</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Taxa atrelada à SELIC + 5%. Cuidado: juros altos podem levar ao Game Over!</p>
      <div class="table-wrap"><table><thead><tr><th>Valor</th><th>Prazo</th><th>Taxa</th><th>Parcela</th><th>Total Juros</th><th>Ação</th></tr></thead><tbody>${optHTML}</tbody></table></div></div>
    ${G.loans.length ? `<div class="card section-gap"><div class="card-title"><i class="fa-solid fa-file-invoice-dollar"></i> Empréstimos Ativos</div><div class="table-wrap"><table><thead><tr><th>Valor Original</th><th>Saldo Devedor</th><th>Taxa</th><th>Restante</th><th>Parcela</th><th>Ação</th></tr></thead><tbody>${activeHTML}</tbody></table></div></div>` : ''}
  `;
}

/* ============================================================
   AÇÕES DO JOGADOR
   ============================================================ */
function takeJob(id) {
  const j = JOBS.find(x=>x.id===id);
  if(!j || !canTakeJob(j)) return;
  G.job = { ...j };
  toast(`Você foi contratado como ${j.title}! Salário: ${fmtFull(j.salary)}/mês`, 'green');
  saveGame(); render();
}

function applyForJob(id) {
  const j = JOBS.find(x=>x.id===id);
  if(!j || !canTakeJob(j) || G.job.id === id) return;
  if(G.jobSearch && G.jobSearch.jobId === id) return toast('Você já está concorrendo a esta vaga.', 'yellow');
  G.jobSearch = { jobId:id, monthsSearching:0 };
  toast(`Inscrição enviada para ${j.title}! Você receberá retorno em breve.`, 'blue');
  saveGame(); render();
}

function cancelJobSearch() {
  if(!G.jobSearch) return;
  const j = JOBS.find(x=>x.id===G.jobSearch.jobId);
  G.jobSearch = null;
  toast(`Busca por ${j?j.title:'vaga'} cancelada.`, 'yellow');
  saveGame(); render();
}

function openCompany() {
  if(G.balance < 100000) return;
  const name = prompt('Nome da empresa:', 'Minha Empresa ' + (G.companies.length + 1));
  if(!name || !name.trim()) return;
  G.balance -= 100000;
  G.companies.push({ name:name.trim(), months:1, lastProfit:0 });
  toast(`Empresa "${name.trim()}" aberta! Fase de maturação: 6 meses com custos de `+fmtFull(5000)+'/mês', 'blue');
  saveGame(); render();
}

function closeCompany(idx) {
  if(idx === undefined && G.companies.length === 1) idx = 0;
  if(idx === undefined || !G.companies[idx]) return;
  const name = G.companies[idx].name || 'Empresa';
  G.companies.splice(idx, 1);
  toast(`${name} fechada.`, 'yellow');
  saveGame(); render();
}

function sellCompany(idx) {
  const c = G.companies[idx];
  if(!c) return;
  if(c.months <= 6) return toast((c.name||'Empresa')+' ainda em maturação não pode ser vendida.', 'red');
  const value = Math.round(50000 + Math.min(c.months, 120) * 2000 + Math.max(0, (c.lastProfit||0)) * 6);
  G.balance += value;
  toast(`${c.name||'Empresa'} vendida por ${fmtFull(value)}!`, 'green');
  G.companies.splice(idx, 1);
  saveGame(); render();
}

function depositSavings() {
  const v = parseFloat(document.getElementById('savDep').value);
  if(!v || v <= 0 || v > G.balance) return toast('Valor inválido ou saldo insuficiente.', 'red');
  G.balance -= v; G.inv.savings += v;
  toast(`Depósito de ${fmtFull(v)} na Poupança.`, 'green');
  saveGame(); render();
}
function withdrawSavings() {
  const v = parseFloat(document.getElementById('savWit').value);
  if(!v || v <= 0 || v > G.inv.savings) return toast('Valor inválido ou saldo insuficiente.', 'red');
  G.inv.savings -= v; G.balance += v;
  toast(`Saque de ${fmtFull(v)} da Poupança.`, 'blue');
  saveGame(); render();
}

function buyFixedIncome(id) {
  const fi = FIXED_INCOME.find(x=>x.id===id);

  if(!fi || !v || v <= 0 || v > G.balance) return toast('Valor inválido ou saldo insuficiente.', 'red');

  G.inv.fixedIncome.push({ name:fi.name, invested:v, currentValue:v, monthlyRate, monthsRemaining:fi.locked, originalMonths:fi.locked });

}

function depositTreasurySelic() {

  G.balance -= v; G.inv.treasurySelic += v;

}
function withdrawTreasurySelic() {

function buyTreasuryIpca(id) {

  G.inv.treasuryIpca.push({ name:t.name, invested:v, currentValue:v, monthlyRate, monthsRemaining:t.locked, originalMonths:t.locked });

}

function buyVar(key, ticker) {
  const el = document.getElementById(`v_${key}_${ticker}`);
  const v = parseFloat(el?.value);
  if(!v || v <= 0 || v > G.balance) return toast('Valor inválido ou saldo insuficiente.', 'red');
  const price = G.prices[ticker] || 0;
  if(price <= 0) return toast('Preço indisponível.', 'red');
  const shares = v / price;
  G.balance -= v;
  if(!G.inv[key][ticker]) G.inv[key][ticker] = { shares:0, avgPrice:0 };
  const h = G.inv[key][ticker];
  const totalCost = h.shares * h.avgPrice + v;
  h.shares += shares;
  h.avgPrice = totalCost / h.shares;
  toast(`Compra de ${shares.toFixed(4)} ${ticker} por ${fmtFull(v)}.`, 'green');
  saveGame(); render();
}

function sellVar(key, ticker) {
  const el = document.getElementById(`vs_${key}_${ticker}`);
  const qty = parseFloat(el?.value);
  const h = G.inv[key][ticker];
  if(!h || !qty || qty <= 0 || qty > h.shares) return toast('Quantidade inválida.', 'red');
  const price = G.prices[ticker] || 0;
  const revenue = qty * price;
  const cost = qty * h.avgPrice;
  h.shares -= qty;
  if(h.shares < 0.0001) { h.shares = 0; h.avgPrice = 0; }
  G.balance += revenue;
  const pnl = revenue - cost;
  toast(`Venda de ${qty.toFixed(4)} ${ticker}: ${fmtFull(revenue)} (${pnl>=0?'lucro':'prejuízo'} ${fmtFull(Math.abs(pnl))})`, pnl>=0?'green':'red');
  saveGame(); render();
}

function sellAllVar(key, ticker) {
  const h = G.inv[key][ticker];
  if(!h || h.shares <= 0) return;
  const price = G.prices[ticker] || 0;
  const revenue = h.shares * price;
  const cost = h.shares * h.avgPrice;
  G.balance += revenue;
  const pnl = revenue - cost;
  h.shares = 0; h.avgPrice = 0;
  toast(`Venda total de ${ticker}: ${fmtFull(revenue)} (${pnl>=0?'lucro':'prejuízo'} ${fmtFull(Math.abs(pnl))})`, pnl>=0?'green':'red');
  saveGame(); render();
}

function buyCar(id) {
  const c = CARS.find(x=>x.id===id);
  if(!c || G.balance < c.price) return toast('Saldo insuficiente.', 'red');
  G.balance -= c.price;
  G.cars.push({ name:c.name, purchasePrice:c.price, currentValue:c.price, cost:c.cost, dep:c.dep });
  toast(`${c.name} comprado por ${fmtFull(c.price)}!`, 'green');
  saveGame(); render();
}
function sellCar(idx) {
  const c = G.cars[idx];
  if(!c) return;
  G.balance += c.currentValue;
  toast(`${c.name} vendido por ${fmtFull(c.currentValue)}.`, 'blue');

}

function buyProperty(id) {
  const p = PROPERTIES.find(x=>x.id===id);
  if(!p || G.balance < p.price) return toast('Saldo insuficiente.', 'red');
  G.balance -= p.price;
  G.properties.push({ name:p.name, purchasePrice:p.price, currentValue:p.price, rent:p.rent, app:p.app, isRented:false });
  toast(`${p.name} comprado por ${fmtFull(p.price)}!`, 'green');
  saveGame(); render();
}
function sellProperty(idx) {
  const p = G.properties[idx];
  if(!p) return;
  G.balance += p.currentValue;
  if(G.livingInProp === idx) G.livingInProp = null;
  else if(G.livingInProp !== null && G.livingInProp > idx) G.livingInProp--;
  toast(`${p.name} vendido por ${fmtFull(p.currentValue)}.`, 'blue');
  G.properties.splice(idx, 1);
  saveGame(); render();
}
function rentProperty(idx) {
  if(!G.properties[idx] || G.livingInProp === idx) return;
  G.properties[idx].isRented = true;
  toast(`${G.properties[idx].name} colocado para alugar. Renda: ${fmtFull(G.properties[idx].rent)}/mês`, 'green');
  saveGame(); render();
}
function unrentProperty(idx) {
  if(!G.properties[idx]) return;
  G.properties[idx].isRented = false;
  toast(`${G.properties[idx].name} desalugado.`, 'yellow');
  saveGame(); render();
}
function liveInProperty(idx) {
  if(!G.properties[idx]) return;
  G.livingInProp = idx;
  G.properties[idx].isRented = false;
  toast(`Agora você mora em ${G.properties[idx].name}. Aluguel zerado!`, 'green');
  saveGame(); render();
}
function stopLiving() {
  G.livingInProp = null;
  toast('Você voltou a pagar aluguel.', 'yellow');
  saveGame(); render();
}

function takeLoan(amount, months, rate) {
  const maxLoans = 3;
  if(G.loans.length >= maxLoans) return toast(`Você já atingiu o limite de ${maxLoans} empréstimos ativos. Quite um primeiro.`, 'red');
  const totalDebtNow = G.loans.reduce((s,l) => s + l.remaining, 0);
  const annualIncome = monthlyIncome() * 12;
  const debtLimit = Math.max(annualIncome * 1.0, calcNetWorth() * 0.5);
  if(totalDebtNow + amount > debtLimit) return toast(`Limite de crédito excedido! Dívida máxima permitida: ${fmtFull(debtLimit)}.`, 'red');
  G.loans.push({ originalAmount:amount, remaining:amount, annualRate:rate, totalMonths:months, monthsRemaining:months });
  G.balance += amount;
  toast(`Empréstimo de ${fmtFull(amount)} aprovado! ${months} parcelas a ${fmtN(rate)}% a.a.`, 'yellow');
  saveGame(); render();
}
function payLoan(idx) {
  const l = G.loans[idx];
  if(!l || G.balance < l.remaining) return toast('Saldo insuficiente para quitar.', 'red');
  G.balance -= l.remaining;
  toast(`Empréstimo de ${fmtFull(l.originalAmount)} quitado!`, 'green');
  G.loans.splice(idx, 1);
  saveGame(); render();
}

/* ============================================================
   LÓGICA DO MÊS
   ============================================================ */
function updatePrices() {
  [...FIIS,...STOCKS,...CRYPTOS].forEach(a => {
    const old = G.prices[a.ticker] || a.basePrice;
    let marketBias = (G.selic - 10) * -0.002;
    const change = (Math.random()-0.5 + marketBias) * a.vol;
    const newPrice = Math.max(old * 0.1, old * (1 + change));
    G.prices[a.ticker] = Math.round(newPrice * 100) / 100;
    if(!G.history[a.ticker]) G.history[a.ticker] = [];
    G.history[a.ticker].push(G.prices[a.ticker]);
    if(G.history[a.ticker].length > 24) G.history[a.ticker].shift();
  });
}

function advanceMonth() {
  const S = { income:{}, expenses:{}, returns:{}, events:[] };
  G.month++;
  G.age = 18 + Math.floor((G.month - 1) / 12);

  if(G.age >= 100) { showGameOver('win'); return; }

  if(G.job && G.job.salary > 0) { G.balance += G.job.salary; S.income.salary = G.job.salary; }

  let compCost = 0, compProfit = 0, compLoss = 0;
  for(let ci = G.companies.length - 1; ci >= 0; ci--) {
    const c = G.companies[ci];
    if(c.months <= 6) {
      G.balance -= 5000; compCost += 5000; c.months++;
    } else {
      const profit = Math.round((3000 + G.month * 50 * (1 + ci * 0.3)) + (Math.random()-0.3) * 12000);
      G.balance += profit; c.lastProfit = profit;
      if(profit >= 0) compProfit += profit; else compLoss += -profit;
      c.months++;
      if(Math.random() < 0.02) {
        S.events.push(`<i class="fa-solid fa-bomb"></i> Sua empresa ${ci+1} faliu!`);
        G.companies.splice(ci, 1);
      }
    }
  }
  if(compCost > 0) S.expenses.companyCost = compCost;
  if(compProfit > 0) S.income.companyProfit = compProfit;
  if(compLoss > 0) S.expenses.companyLoss = compLoss;

  const savRet = G.inv.savings * (0.06/12);
  G.inv.savings += savRet;
  if(savRet > 0) S.returns.poupanca = savRet;

  let fiMatured = 0;
  G.inv.fixedIncome.forEach(inv => { inv.currentValue *= (1 + inv.monthlyRate); inv.monthsRemaining--; });
  G.inv.fixedIncome = G.inv.fixedIncome.filter(inv => { if(inv.monthsRemaining <= 0) { fiMatured += inv.currentValue; return false; } return true; });
  if(fiMatured > 0) { G.balance += fiMatured; S.returns.rfMatured = fiMatured; }

  const tsRate = (G.selic - 0.15) / 12 / 100;
  const tsRet = G.inv.treasurySelic * tsRate;
  G.inv.treasurySelic += tsRet;
  if(tsRet > 0) S.returns.tesouroSelic = tsRet;

  let ipcaMatured = 0;
  G.inv.treasuryIpca.forEach(inv => { inv.currentValue *= (1 + inv.monthlyRate); inv.monthsRemaining--; });
  G.inv.treasuryIpca = G.inv.treasuryIpca.filter(inv => { if(inv.monthsRemaining <= 0) { ipcaMatured += inv.currentValue; return false; } return true; });
  if(ipcaMatured > 0) { G.balance += ipcaMatured; S.returns.ipcaMatured = ipcaMatured; }

  let fiiDiv = 0;
  for(const ticker in G.inv.fiis) {
    const h = G.inv.fiis[ticker];
    if(h.shares > 0) { const fii = FIIS.find(f=>f.ticker===ticker); if(fii) fiiDiv += h.shares * (G.prices[ticker]||0) * fii.dy; }
  }
  if(fiiDiv > 0) { G.balance += fiiDiv; S.returns.fiiDividends = fiiDiv; }

  const propMult = propertyExpenseMultiplier();
  let rent = G.livingInProp !== null ? 0 : G.expenses.rent;
  let foodCost = Math.round(G.expenses.food * propMult);
  let utilitiesCost = Math.round(G.expenses.utilities * propMult);
  let fixedTotal = rent + foodCost + G.expenses.transport + G.expenses.insurance + utilitiesCost;
  G.balance -= fixedTotal; S.expenses.fixed = fixedTotal;
  if(rent > 0) S.expenses.rent = rent;
  else if(G.livingInProp !== null) S.income.noRent = G.expenses.rent;
  if(propMult > 1) {
    S.events.push(`<i class="fa-solid fa-house-chimney"></i> Despesas da casa (x${propMult.toFixed(1)}): comida ${fmtFull(foodCost)} + contas ${fmtFull(utilitiesCost)}`);
  }

  let carCost = 0;
  G.cars.forEach(c => { carCost += c.cost; c.currentValue *= (1 - c.dep); c.currentValue = Math.max(c.currentValue, c.purchasePrice * 0.15); });
  if(carCost > 0) { G.balance -= carCost; S.expenses.cars = carCost; }

  let rentalInc = 0;
  G.properties.forEach(p => { if(p.isRented) rentalInc += p.rent; p.currentValue *= (1 + p.app); });
  if(rentalInc > 0) { G.balance += rentalInc; S.income.rental = rentalInc; }

  let loanPay = 0;
  G.loans.forEach(l => {
    const interest = l.remaining * (l.annualRate / 12 / 100);
    const amort = l.originalAmount / l.totalMonths;
    G.balance -= (interest + amort);
    l.remaining = Math.max(0, l.remaining - amort);
    l.monthsRemaining--;
    loanPay += interest + amort;
  });
  G.loans = G.loans.filter(l => l.monthsRemaining > 0 && l.remaining > 1);
  if(loanPay > 0) S.expenses.loans = loanPay;

  updatePrices();

  if(Math.random() < 0.15) {
    const ev = EVENTS[randInt(0, EVENTS.length-1)];
    const adj = Math.round(ev.cost * (1 + G.inflation/100));
    G.balance -= adj;
    S.events.push(`<i class="fa-solid fa-triangle-exclamation"></i> ${ev.text} <span style="color:var(--red)">-${fmtFull(adj)}</span>`);
    G.events.push(`Mês ${monthLabel(G.month)}: ${ev.text} -${fmtFull(adj)}`);
    if(ev.text.includes('Nasceu seu filho')) {
      G.children.push({ birthMonth: G.month });
    }
    if(ev.text.includes('Divórcio')) {
      const nw = calcNetWorth();
      const penalty = Math.round(nw * 0.25);
      G.balance = Math.max(0, G.balance - penalty);
      S.events.push(`<i class="fa-solid fa-heart-broken" style="color:var(--red)"></i> Divórcio: perda de 25% do patrimônio! <span style="color:var(--red)">-${fmtFull(penalty)}</span>`);
      ['stocks','fiis','crypto'].forEach(cat => {
        for(const t in G.inv[cat]) {
          if(G.inv[cat][t].shares > 0) {
            G.inv[cat][t].shares *= 0.75;
            if(G.inv[cat][t].shares < 0.0001) { G.inv[cat][t].shares = 0; G.inv[cat][t].avgPrice = 0; }
          }
        }
      });
      if(G.properties.length > 0) {
        const lp = randInt(0, G.properties.length - 1);
        S.events.push(`<i class="fa-solid fa-house-crack" style="color:var(--red)"></i> ${G.properties[lp].name} ficou com o(a) ex-cônjuge!`);
        G.properties.splice(lp, 1);
      }
      if(G.cars.length > 0) {
        const lc = randInt(0, G.cars.length - 1);
        S.events.push(`<i class="fa-solid fa-car-side" style="color:var(--red)"></i> ${G.cars[lc].name} ficou com o(a) ex-cônjuge!`);
        G.cars.splice(lc, 1);
      }
    }
  }

  if(G.children.length > 0) {
    G.children.forEach((child, idx) => {
      const childAge = Math.floor((G.month - child.birthMonth) / 12);
      const monthsSinceBirth = G.month - child.birthMonth;
      if(monthsSinceBirth > 0 && monthsSinceBirth % 12 === 0) {
        const baseCost = 300 + childAge * 200;
        const cost = Math.round(baseCost * (1 + G.inflation/100));
        G.balance -= cost;
        S.events.push(`<i class="fa-solid fa-cake-candles"></i> Aniversário de ${childAge} ${childAge===1?'ano':'anos'} do(a) filho(a) — despesas: ${fmtFull(cost)}`);
        G.events.push(`Mês ${monthLabel(G.month)}: Aniversário filho(a) ${childAge} anos -${fmtFull(cost)}`);
        if(childAge === 6) {
          const sc = Math.round(5000 * (1 + G.inflation/100));
          G.balance -= sc;
          S.events.push(`<i class="fa-solid fa-school"></i> Filho(a) entrou na escola! Matrícula: ${fmtFull(sc)}`);
        }
        if(childAge === 15) {
          const pc = Math.round(8000 * (1 + G.inflation/100));
          G.balance -= pc;
          S.events.push(`<i class="fa-solid fa-star"></i> Festa de 15 anos do(a) filho(a)! ${fmtFull(pc)}`);
        }
        if(childAge === 18) {
          const uc = Math.round(12000 * (1 + G.inflation/100));
          G.balance -= uc;
          S.events.push(`<i class="fa-solid fa-graduation-cap"></i> Filho(a) entrou na faculdade! Custos: ${fmtFull(uc)}`);
        }
        if(childAge === 22) {
          S.events.push(`<i class="fa-solid fa-briefcase"></i> Filho(a) se formou e agora é independente!`);
        }
      }
    });
  }

  if(G.age >= 58 && Math.random() < 0.08) {
    const hev = HEALTH_EVENTS[randInt(0, HEALTH_EVENTS.length-1)];
    const hadj = Math.round(hev.cost * (1 + G.inflation/100) * (1 + (G.age - 58) / 100));
    G.balance -= hadj;
    S.events.push(`<i class="fa-solid fa-heart-pulse" style="color:var(--red)"></i> Problema de saúde! ${hev.text} <span style="color:var(--red)">-${fmtFull(hadj)}</span>`);
    G.events.push(`Mês ${monthLabel(G.month)}: ${hev.text} -${fmtFull(hadj)}`);
  }

  if(G.job && G.job.id !== 'desempregado') {
    if(Math.random() < 0.05) {
      const ni = JOBS.findIndex(j=>j.id===G.job.id) + 1;
      if(ni < JOBS.length) { const nx = JOBS[ni]; if(canTakeJob(nx)) { G.job = { ...nx }; G.jobSearch = null; S.events.push(`<i class="fa-solid fa-arrow-up" style="color:var(--green)"></i> Promovido para <strong>${nx.title}</strong>! Novo salário: ${fmtFull(nx.salary)}`); } }
    }
    if(Math.random() < 0.03 && G.job.id !== 'desempregado') {
      const ot = G.job.title; G.job = { ...JOBS[0] };
      G.jobSearch = null;
      S.events.push(`<i class="fa-solid fa-arrow-down" style="color:var(--red)"></i> Demitido de <strong>${ot}</strong>!`);
    }
  }

  if(G.jobSearch) {
    G.jobSearch.monthsSearching++;
    const level = JOBS.findIndex(x=>x.id===G.jobSearch.jobId);
    const baseChance = Math.max(2, 35 - level * 4.5);
    const totalChance = Math.min(95, baseChance + G.jobSearch.monthsSearching * 5) / 100;
    if(Math.random() < totalChance) {
      const newJob = JOBS.find(x=>x.id===G.jobSearch.jobId);
      if(newJob) {
        G.job = { ...newJob };
        S.events.push(`<i class="fa-solid fa-check-circle" style="color:var(--green)"></i> Chamado para <strong>${newJob.title}</strong>! Salário: ${fmtFull(newJob.salary)}`);
        G.jobSearch = null;
      }
    }
  }

  if(G.month % (Math.random() < 0.5 ? 3 : 6) === 0) {
    G.selic = Math.round(clamp(G.selic + rand(-1.5, 1.5), 5, 20) * 10) / 10;
    G.inflation = Math.round(clamp(G.inflation + rand(-1, 1), 1, 12) * 10) / 10;
    S.events.push(`<i class="fa-solid fa-chart-bar" style="color:var(--yellow)"></i> Economia atualizada: SELIC ${fmtN(G.selic)}%, Inflação ${fmtN(G.inflation)}%`);
  }

  const nw = calcNetWorth();
  if(nw > G.peakNetWorth) G.peakNetWorth = nw;
  G.histNW.push(Math.round(nw * 100) / 100);
  G.histSelic.push(G.selic);
  G.histInflation.push(G.inflation);
  G.histMonths.push(monthLabel(G.month));
  if(G.histNW.length > 120) { G.histNW.shift(); G.histSelic.shift(); G.histInflation.shift(); G.histMonths.shift(); }

  if(G.balance < -100000) { showGameOver(); return; }

  saveGame();
  showMonthSummary(S);
  render();
}

/* ============================================================
   MODAL DE RESUMO MENSAL
   ============================================================ */
function showMonthSummary(S) {
  document.getElementById('summaryTitle').textContent = `Resumo — Mês ${monthLabel(G.month)}`;
  let html = '';

  const incItems = [];
  if(S.income.salary) incItems.push(['Salário', S.income.salary]);
  if(S.income.companyProfit) incItems.push(['Lucro da Empresa', S.income.companyProfit]);
  if(S.income.rental) incItems.push(['Aluguéis Recebidos', S.income.rental]);
  if(S.income.noRent) incItems.push(['Economia de Aluguel', S.income.noRent]);
  if(incItems.length) {
    html += '<div style="margin-bottom:12px"><div style="font-size:.78rem;color:var(--green);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Receitas</div>';
    incItems.forEach(([l,v]) => { html += `<div class="summary-row"><span class="sr-label">${l}</span><span class="mono" style="color:var(--green)">${fmtFull(v)}</span></div>`; });
    html += '</div>';
  }

  const expItems = [];
  if(S.expenses.rent) expItems.push(['Aluguel', S.expenses.rent]);
  if(S.expenses.fixed) expItems.push(['Despesas Fixas', S.expenses.fixed - (S.expenses.rent||0)]);
  if(S.expenses.cars) expItems.push(['Manutenção de Carros', S.expenses.cars]);
  if(S.expenses.companyCost) expItems.push(['Custo Empresa (maturação)', S.expenses.companyCost]);
  if(S.expenses.companyLoss) expItems.push(['Prejuízo da Empresa', S.expenses.companyLoss]);
  if(S.expenses.loans) expItems.push(['Parcelas de Empréstimos', S.expenses.loans]);
  if(expItems.length) {
    html += '<div style="margin-bottom:12px"><div style="font-size:.78rem;color:var(--red);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Despesas</div>';
    expItems.forEach(([l,v]) => { html += `<div class="summary-row"><span class="sr-label">${l}</span><span class="mono" style="color:var(--red)">${fmtFull(v)}</span></div>`; });
    html += '</div>';
  }

  const retItems = [];
  if(S.returns.poupanca) retItems.push(['Poupança', S.returns.poupanca]);
  if(S.returns.tesouroSelic) retItems.push(['Tesouro Selic', S.returns.tesouroSelic]);
  if(S.returns.fiiDividends) retItems.push(['Dividendos FIIs', S.returns.fiiDividends]);
  if(S.returns.rfMatured) retItems.push(['Renda Fixa Vencida', S.returns.rfMatured]);
  if(S.returns.ipcaMatured) retItems.push(['Tesouro IPCA+ Vencido', S.returns.ipcaMatured]);
  if(retItems.length) {
    html += '<div style="margin-bottom:12px"><div style="font-size:.78rem;color:var(--accent);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Rendimentos</div>';
    retItems.forEach(([l,v]) => { html += `<div class="summary-row"><span class="sr-label">${l}</span><span class="mono" style="color:var(--accent)">${fmtFull(v)}</span></div>`; });
    html += '</div>';
  }

  if(S.events.length) {
    html += '<div style="margin-bottom:12px"><div style="font-size:.78rem;color:var(--yellow);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Eventos</div>';
    S.events.forEach(e => { html += `<div class="event-item">${e}</div>`; });
    html += '</div>';
  }

  html += `<div class="summary-total"><span>Saldo Atual</span><span class="mono" style="color:${G.balance>=0?'var(--green)':'var(--red)'}">${fmtFull(G.balance)}</span></div>`;
  document.getElementById('summaryContent').innerHTML = html;
  document.getElementById('summaryModal').classList.add('show');
}

function closeSummary() { document.getElementById('summaryModal').classList.remove('show'); }

/* ============================================================
   GAME OVER E RESET
   ============================================================ */
function showGameOver(type) {
  const go = document.getElementById('gameover');
  const icon = go.querySelector('i');
  const title = go.querySelector('h1');
  const text = document.getElementById('goText');
  if(type === 'win') {
    const nw = calcNetWorth();
    icon.className = 'fa-solid fa-trophy';
    icon.style.color = 'var(--yellow)';
    title.textContent = 'PARABÉNS! VIDA LONGA!';
    title.style.color = 'var(--yellow)';
    text.innerHTML = `Você chegou aos 100 anos!<br><br>Patrimônio final: <strong style="color:var(--green)">${fmtFull(nw)}</strong><br>Pico patrimonial: <strong style="color:var(--green)">${fmtFull(G.peakNetWorth)}</strong><br>Total de meses jogados: <strong>${G.month}</strong>`;
  } else {
    icon.className = 'fa-solid fa-skull-crossbones';
    icon.style.color = 'var(--red)';
    title.textContent = 'GAME OVER';
    title.style.color = 'var(--red)';
    text.innerHTML = `Seu saldo atingiu <strong style="color:var(--red)">${fmtFull(G.balance)}</strong>, ultrapassando o limite de -R$ 100.000.<br><br>Você sobreviveu por <strong>${G.month}</strong> meses (${G.age} anos). Pico patrimonial: <strong style="color:var(--green)">${fmtFull(G.peakNetWorth)}</strong>.`;
  }
  go.classList.add('show');
  localStorage.removeItem('finSim');
}

function confirmReset() {
  if(resetPending) { resetGame(); return; }
  resetPending = true;
  const btn = document.getElementById('resetBtn');
  btn.innerHTML = '<i class="fa-solid fa-exclamation-triangle"></i> Confirmar?';
  btn.classList.remove('btn-ghost'); btn.classList.add('btn-red');
  setTimeout(() => { resetPending = false; btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Resetar'; btn.classList.remove('btn-red'); btn.classList.add('btn-ghost'); }, 3000);
}

function resetGame() {
  localStorage.removeItem('finSim');
  if(chartNW) { chartNW.destroy(); chartNW = null; }
  if(chartMacro) { chartMacro.destroy(); chartMacro = null; }
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('game').style.display = 'none';
  document.getElementById('welcome').classList.remove('hidden');
  G = null; activeTab = 'dashboard'; activeInvTab = 'reserva';
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
function startGame() {
  const name = document.getElementById('nameInput').value.trim();
  if(!name) { document.getElementById('nameInput').style.borderColor='var(--red)'; return; }
  G = newGame(name);
  saveGame();
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('game').style.display = 'block';
  render();
  toast(`Bem-vindo, ${name}! Seu saldo inicial é ${fmtFull(G.balance)}.`, 'blue');
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') startGame();
  document.getElementById('nameInput').style.borderColor = 'var(--border)';
});

document.addEventListener('keydown', e => { if(e.key === 'Escape') closeSummary(); });

(function init() {
  if(loadGame() && G && G.name) {
    if(!G.histNW) G.histNW = [calcNetWorth()];
    if(!G.histSelic) G.histSelic = [G.selic];
    if(!G.histInflation) G.histInflation = [G.inflation];
    if(!G.histMonths) G.histMonths = [monthLabel(G.month)];
    if(G.company && !G.companies) { G.companies = [G.company]; delete G.company; }
    if(!G.companies) G.companies = [];
    if(G.age === undefined) G.age = 18 + Math.floor((G.month - 1) / 12);
    if(!G.children) G.children = [];
    if(G.jobSearch === undefined) G.jobSearch = null;
    if(G.companies) G.companies.forEach(c => { if(!c.name) c.name = 'Empresa'; });
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('game').style.display = 'block';
    render();
  }
})();
</script>
